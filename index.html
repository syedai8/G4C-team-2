<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nectar Rush Saga</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <script src="https://unpkg.com/feather-icons@4.28.0/dist/feather.min.js"></script>

  <style>
    /* Global Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
      scroll-behavior: smooth;
      background-image: url('https://th.bing.com/th/id/OIP.D06nhnxEMI5WdgvSl6fb2QHaE7?w=273&h=182&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3');
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      color: #000;
    }

    /* Optional semi-transparent overlay for readability */
    body::before {
      content: '';
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background: rgba(255,255,255,0.75);
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: #000;
    }
    a:hover {
      color: #ff9900;
    }

    .centered-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .center-all {
      text-align: center;
    }
    .navigation-desktop a:hover {
      color: #ff9900;
      border-bottom: 3px solid #ff9900 !important;
      transition: 0.3s;
    }

    .icon-link i:hover {
      transform: scale(1.3);
      transition: 0.3s;
      color: #ff9900 !important;
    }

    .content-section {
      margin: 60px auto;
      max-width: 900px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 1s ease-in-out;
      color: #000;
    }

    .content-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Avatar animation */
    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid #f4e1c1;
      object-fit: cover;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Section headers */
    h1, h2, h4 {
      color: #000;
      font-family: 'Times New Roman', Times, serif;
    }
    h2 {
      border-bottom: 3px solid #ff9900;
      padding-bottom: 5px;
      display: inline-block;
    }

    /* Mobile Nav */
    #mobile-nav a {
      display: block;
      margin: 10px 0;
      transition: color 0.3s, border-bottom 0.3s;
      color: #000;
      font-family: 'Times New Roman', Times, serif;
    }
    #mobile-nav a:hover {
      color: #ff9900;
      border-bottom: 2px solid #ff9900;
    }

    /* Paragraph styling */
    p {
      line-height: 1.6;
      margin-bottom: 1rem;
      color: #000;
      font-family: 'Times New Roman', Times, serif;
    }

  </style>
</head>
